<svg width="430" height="180" viewBox="0 0 430 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Zekai Qian GitHub snapshot</title>
  <desc id="desc">GitHub profile card showing public repositories, stars, followers, and current research highlights.</desc>
  <rect width="430" height="180" rx="10" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="429" height="179" rx="9.5" stroke="#d0d7de"/>
  <text x="24" y="34" fill="#24292f" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700">Zekai's GitHub Snapshot</text>
  <text x="24" y="56" fill="#57606a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">Data cleaning, data-centric AI, and reproducible artifacts</text>

  <g transform="translate(24 78)">
    <rect width="88" height="68" rx="8" fill="#ddf4ff"/>
    <text x="14" y="26" fill="#0969da" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">25</text>
    <text x="14" y="48" fill="#57606a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">Public repos</text>
  </g>
  <g transform="translate(122 78)">
    <rect width="88" height="68" rx="8" fill="#fff8c5"/>
    <text x="14" y="26" fill="#9a6700" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">82</text>
    <text x="14" y="48" fill="#57606a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">Repo stars</text>
  </g>
  <g transform="translate(220 78)">
    <rect width="88" height="68" rx="8" fill="#dafbe1"/>
    <text x="14" y="26" fill="#1a7f37" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">12</text>
    <text x="14" y="48" fill="#57606a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">Followers</text>
  </g>
  <g transform="translate(318 78)">
    <rect width="88" height="68" rx="8" fill="#ffebe9"/>
    <text x="14" y="26" fill="#cf222e" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="22" font-weight="700">2026</text>
    <text x="14" y="48" fill="#57606a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">ICML DMCO</text>
  </g>

  <text x="24" y="166" fill="#6e7781" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11">Static card generated from public GitHub data to avoid third-party image timeouts.</text>
</svg>
