<svg width="430" height="180" viewBox="0 0 430 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Top languages used in public repositories</title>
  <desc id="desc">A local SVG language card showing HTML, JavaScript, Python, Java, TeX, Jupyter Notebook, and other languages.</desc>
  <rect width="430" height="180" rx="10" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="429" height="179" rx="9.5" stroke="#d0d7de"/>
  <text x="24" y="34" fill="#24292f" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="700">Top Languages</text>
  <text x="24" y="56" fill="#57606a" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">By language bytes across public repositories</text>

  <g transform="translate(24 74)">
    <rect width="382" height="14" rx="7" fill="#eaeef2"/>
    <rect x="0" y="0" width="89.6" height="14" rx="7" fill="#e34c26"/>
    <rect x="89.6" y="0" width="86.0" height="14" fill="#f1e05a"/>
    <rect x="175.6" y="0" width="79.0" height="14" fill="#3572A5"/>
    <rect x="254.6" y="0" width="54.4" height="14" fill="#b07219"/>
    <rect x="309.0" y="0" width="34.9" height="14" fill="#3D6117"/>
    <rect x="343.9" y="0" width="13.7" height="14" fill="#DA5B0B"/>
    <rect x="357.6" y="0" width="24.4" height="14" rx="7" fill="#8b949e"/>
  </g>

  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12">
    <circle cx="30" cy="111" r="5" fill="#e34c26"/><text x="42" y="115" fill="#24292f">HTML</text><text x="130" y="115" fill="#57606a">23.5%</text>
    <circle cx="30" cy="134" r="5" fill="#f1e05a"/><text x="42" y="138" fill="#24292f">JavaScript</text><text x="130" y="138" fill="#57606a">22.5%</text>
    <circle cx="30" cy="157" r="5" fill="#3572A5"/><text x="42" y="161" fill="#24292f">Python</text><text x="130" y="161" fill="#57606a">20.7%</text>

    <circle cx="222" cy="111" r="5" fill="#b07219"/><text x="234" y="115" fill="#24292f">Java</text><text x="344" y="115" fill="#57606a">14.2%</text>
    <circle cx="222" cy="134" r="5" fill="#3D6117"/><text x="234" y="138" fill="#24292f">TeX</text><text x="344" y="138" fill="#57606a">9.1%</text>
    <circle cx="222" cy="157" r="5" fill="#DA5B0B"/><text x="234" y="161" fill="#24292f">Notebook</text><text x="344" y="161" fill="#57606a">3.6%</text>
  </g>
</svg>
